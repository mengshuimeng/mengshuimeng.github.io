baseURL: "https://mengshuimeng.github.io/"
timeZone: Asia/Shanghai

defaultContentLanguage: zh-cn
languages:
  zh-cn:
    title: 萌睡梦
    label: 简体中文
    weight: 1
    params:
      dateFormat: "2006年1月2日"
    menus:
      main:
        - name: 首页
          pageRef: /
          weight: 1
        - name: 关于我
          pageRef: /about
          weight: 2
        - name: 项目
          pageRef: /projects
          weight: 3
        - name: 博客
          pageRef: /blog
          weight: 4
        - name: 标签
          pageRef: /tags
          weight: 5
        - name: 文档
          pageRef: /docs
          weight: 6
        - name: 搜索
          weight: 7
          params:
            type: search
            label: false
        - name: Language
          weight: 8
          params:
            type: language-switch
        - name: 主题
          weight: 9
          params:
            type: theme-toggle
        - name: GitHub
          weight: 10
          url: "https://github.com/mengshuimeng/mengshuimeng.github.io"
          params:
            icon: github

  en:
    title: Mengshuimeng
    label: English
    weight: 2
    params:
      dateFormat: "January 2, 2006"
    menus:
      main:
        - name: Home
          pageRef: /
          weight: 1
        - name: About
          pageRef: /about
          weight: 2
        - name: Projects
          pageRef: /projects
          weight: 3
        - name: Blog
          pageRef: /blog
          weight: 4
        - name: Tags
          pageRef: /tags
          weight: 5
        - name: Docs
          pageRef: /docs
          weight: 6
        - name: Search
          weight: 7
          params:
            type: search
        - name: Language
          weight: 8
          params:
            type: language-switch
        - name: Theme
          weight: 9
          params:
            type: theme-toggle
        - name: GitHub
          weight: 10
          url: "https://github.com/mengshuimeng/mengshuimeng.github.io"
          params:
            icon: github

enableRobotsTXT: true
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        enable: true
        delimiters:
          inline: [["$", "$"]]
          block: [['\[', '\]'], ["$$", "$$"]]
  highlight:
    noClasses: false
    lineNos: true

params:
  displayUpdatedDate: true
  externalLinkDecoration: true
  enableInlineShortcodes: true

  navbar:
    displayTitle: true
    displayLogo: false
    width: wide

  footer:
    displayCopyright: true
    displayPoweredBy: true
    width: wide

  page:
    width: wide
    contextMenu:
      enable: true

  toc:
    displayTags: true

  blog:
    list:
      displayTags: true
      sortBy: lastmod

  search:
    enable: true
    type: flexsearch
    flexsearch:
      index: content
      tokenize: forward

  imageZoom:
    enable: true

  math:
    engine: mathjax

  editURL:
    enable: true
    base: "https://github.com/mengshuimeng/mengshuimeng.github.io/edit/main"

outputs:
  page: [html, markdown]

minify:
  minifyOutput: true
