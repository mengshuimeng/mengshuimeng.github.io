title: 萌睡梦
baseURL: "https://mengshuimeng.github.io/"
languageCode: "zh-cn"
enableRobotsTXT: true

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false

menu:
  main:
    - name: 首页
      pageRef: /
      weight: 1
    - name: 关于我
      pageRef: /about
      weight: 2
    - name: 项目
      pageRef: /projects
      weight: 3
    - name: 博客
      pageRef: /blog
      weight: 4
    - name: 简历
      pageRef: /resume
      weight: 5
    - name: 搜索
      weight: 6
      params:
        type: search
    - name: GitHub
      weight: 7
      url: "https://github.com/mengshuimeng"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: true

  editURL:
    enable: false